# CI + release artifacts — runs at RELEASE time only (Richard 2026-07-12: no
# CI on every commit; the local gates cover development). Two jobs:
#  - gates: build + the offline engine gates (no radio needed) on v* tags,
#    external pull requests, and manual dispatch
#  - artifacts: AppImage + .deb + .rpm on ubuntu-24.04 (glibc 2.39 floor —
#    Ubuntu 24.04+, Debian 13+, Fedora 40+, Mint 22, Arch, ...); v* tags and
#    manual dispatch (dry run, no attach). Both packages are install-tested
#    in fresh ubuntu:24.04 / fedora:40 containers BEFORE anything is attached
#    to the GitHub Release (alpha/beta tags marked pre-release).
name: build

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  APT_DEPS: >-
    meson ninja-build libgtk-4-dev libadwaita-1-dev libfftw3-dev libopus-dev
    libssl-dev zlib1g-dev libpipewire-0.3-dev libwebsockets-dev

jobs:
  gates:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $APT_DEPS
      - name: Build
        run: |
          meson setup build
          meson compile -C build
      - name: Offline gates
        run: |
          for g in sdrfl-wdsp-smoke sdrfl-txprobe sdrfl-txgate-test \
                   sdrfl-txdsp-test sdrfl-swr-test sdrfl-tci-test; do
            echo "── $g"
            ./build/$g
          done

  artifacts:
    runs-on: ubuntu-24.04
    needs: gates
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write   # attach the artifacts to the release on tag pushes
    steps:
      - uses: actions/checkout@v4
      - name: Determine version (tag must match meson.build)
        run: |
          MESON_VER=$(grep -Po "version : '\K[^']+" meson.build)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VER" != "$MESON_VER" ]]; then
              echo "::error::tag $GITHUB_REF_NAME != meson version $MESON_VER"
              exit 1
            fi
          fi
          echo "SDRFL_VERSION=$MESON_VER" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $APT_DEPS \
            patchelf librsvg2-common gsettings-desktop-schemas \
            adwaita-icon-theme file wget
      - name: Build (release, prefix /usr)
        run: |
          meson setup build --buildtype=release --prefix=/usr
          meson compile -C build
          DESTDIR=$PWD/AppDir meson install -C build
          # Separate CLEAN staging for the deb/rpm payload — linuxdeploy
          # mutates AppDir (bundled libs, hooks) and none of that belongs in
          # a distro package.
          DESTDIR=$PWD/build-pkg/staging meson install -C build
      - name: Fetch linuxdeploy + GTK plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
      - name: Build AppImage
        env:
          DEPLOY_GTK_VERSION: "4"
        run: |
          # linuxdeploy names the file from the .desktop Name= + $VERSION
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            export VERSION="${SDRFL_VERSION}"
          else
            export VERSION="${SDRFL_VERSION}-git$(git rev-parse --short HEAD)"
          fi
          # linuxdeploy derives the AppRun target from the .desktop Exec and
          # expects a bare binary name; the absolute /usr/bin path we now bake
          # in for distro installs would confuse it. Strip it back to bare here.
          # Only touches AppDir — the deb/rpm staging copy keeps the absolute
          # path, so packages are unaffected.
          sed -i 's|^Exec=.*/|Exec=|' AppDir/usr/share/applications/cz.ok1br.sdr_for_linux.desktop
          # Phase 1: deploy libs + GTK plugin (hooks, schemas, pixbuf loaders)
          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --plugin gtk
          # The gstreamer media module would dlopen the HOST gstreamer (symbol
          # skew vs the bundled glib) and we play no media — drop it. And a
          # libadwaita app must NOT run with GTK_THEME set (the plugin's
          # GTK3-era default): it would suppress libadwaita's own stylesheet.
          rm -f AppDir/usr/lib/gtk-4.0/*/media/libmedia-gstreamer.so
          sed -i '/^export GTK_THEME=/d' AppDir/apprun-hooks/linuxdeploy-plugin-gtk.sh
          # The hook's forced X11 backend is a GTK3-era workaround we must NOT
          # inherit: GNOME 50 (X11 backend removed) fails to match XWayland
          # windows' WM_CLASS to the .desktop entry, so the app shows a generic
          # gear in the dash/Alt-Tab. Our GTK4 app runs Wayland natively (the
          # NVIDIA GL crash the hook worked around is already covered by the
          # GSK_RENDERER=cairo default in main()); GDK autodetects x11 on X11
          # sessions.
          sed -i '/^export GDK_BACKEND=x11/d' AppDir/apprun-hooks/linuxdeploy-plugin-gtk.sh
          # Phase 2: pack the AppImage
          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --output appimage
          ls -la *.AppImage
      - name: Build .deb + .rpm (nfpm)
        run: |
          curl -sL https://github.com/goreleaser/nfpm/releases/download/v2.47.0/nfpm_2.47.0_Linux_x86_64.tar.gz \
            | tar xz -C /tmp nfpm
          mkdir -p dist
          /tmp/nfpm package -f packaging/nfpm.yaml -p deb -t dist/
          /tmp/nfpm package -f packaging/nfpm.yaml -p rpm -t dist/
          ls -la dist/
      - name: Install-test the .deb (ubuntu:24.04)
        run: |
          docker run --rm -v "$PWD/dist:/dist:ro" ubuntu:24.04 bash -ec '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -q
            apt-get install -yq /dist/*.deb
            if ldd /usr/bin/sdr-for-linux | grep "not found"; then exit 1; fi
            test -f /usr/share/applications/cz.ok1br.sdr_for_linux.desktop
            echo "deb install OK"'
      - name: Install-test the .rpm (fedora:40)
        run: |
          docker run --rm -v "$PWD/dist:/dist:ro" fedora:40 bash -ec '
            dnf install -y -q /dist/*.rpm
            if ldd /usr/bin/sdr-for-linux | grep "not found"; then exit 1; fi
            test -f /usr/share/applications/cz.ok1br.sdr_for_linux.desktop
            echo "rpm install OK"'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            SDR_for_Linux-*.AppImage
            dist/*.deb
            dist/*.rpm
      - name: Attach to release (tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SDR_for_Linux-*.AppImage
            dist/*.deb
            dist/*.rpm
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          # The release (with curated notes) is created via `gh release create`
          # BEFORE the tag build runs — this step only attaches the artifacts.
          generate_release_notes: false
